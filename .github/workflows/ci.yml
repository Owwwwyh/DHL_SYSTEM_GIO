name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dhl_kb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dhl_kb_test?schema=public
      NEXTAUTH_SECRET: ci-test-secret-not-real
      NEXTAUTH_URL: http://localhost:3000
      UIPATH_API_KEY: ci-test-key
      # Pin the seeded admin password so the Playwright login step keeps
      # working. The seed script otherwise generates a random one.
      SEED_ADMIN_PASSWORD: admin123
      SEED_EDITOR_PASSWORD: editor123
      # No BLOB_READ_WRITE_TOKEN -> uploadBinary() falls back to local FS,
      # which is fine for CI since the runner has a writable filesystem.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prisma generate
        run: npx prisma generate

      - name: Apply database migrations
        run: npm run db:migrate:deploy

      - name: Seed starter accounts
        run: npm run seed

      - name: Lint
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm run test:run

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests (Playwright)
        run: npm run test:e2e
